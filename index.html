<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS | Pro Solver Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
        }
        .dark-card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background-color: #1e3a8a33;
        }
        .secret-glow {
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <div class="md:col-span-4 space-y-8">
                <div class="dark-card rounded-2xl p-6">
                    <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">Secret Solver <span class="text-xs font-mono px-2 py-1 bg-slate-700 rounded text-slate-400">SSS v3.0</span></h1>
                    <p class="text-slate-400 text-sm">Shamir’s Secret Sharing threshold scheme reconstruction portal.</p>
                </div>

                <div class="dark-card rounded-2xl p-8">
                    <h3 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Initialize Data Stream
                    </h3>
                    
                    <div id="dropZone" class="upload-area rounded-xl p-10 text-center transition-all cursor-pointer bg-slate-800/50">
                        <input type="file" id="jsonInput" accept=".json" class="hidden">
                        <div class="text-5xl mb-4 text-blue-500">📁</div>
                        <p class="font-medium">Upload JSON file</p>
                        <p class="text-xs text-slate-500 mt-1">Drag and drop or click</p>
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-700 space-y-3">
                        <p class="text-xs uppercase tracking-wider text-slate-500 font-bold">System Status</p>
                        <div class="flex items-center gap-2 text-sm">
                            <span class="relative flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                            </span>
                            Quantum Core Active
                        </div>
                        <div id="fileStatus" class="text-sm text-slate-400">Waiting for data input...</div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 grid grid-cols-1 gap-8">
                <div id="resultCard" class="dark-card rounded-2xl p-8 transform transition-all duration-500 opacity-0 h-0 overflow-hidden">
                    <p class="text-sm uppercase tracking-widest text-slate-500 font-bold mb-3">Reconstructed Secret Key</p>
                    <div id="secretOutput" class="text-7xl font-bold text-yellow-400 break-all secret-glow leading-none">--</div>
                    <div id="validationStats" class="text-xs mt-6 text-slate-500 font-mono pt-4 border-t border-slate-700"></div>
                </div>

                <div id="sharesCard" class="dark-card rounded-2xl p-8 transform transition-all duration-500 opacity-0 h-0 overflow-hidden">
                    <h3 class="text-xl font-semibold mb-6">Decoded Share Points</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-slate-500 uppercase border-b border-slate-700">
                                <tr>
                                    <th class="py-3 px-2">ID (X)</th>
                                    <th class="py-3 px-2">Value (Y)</th>
                                    <th class="py-3 px-2">Base Used</th>
                                </tr>
                            </thead>
                            <tbody id="sharesTable" class="text-slate-200"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
